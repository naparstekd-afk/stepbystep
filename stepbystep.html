<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1E3A6E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="stepbystep">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231E3A6E'/%3E%3Ctext x='90' y='118' font-size='90' text-anchor='middle' fill='%23B8893A'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<title>stepbystep — Beth Habad</title>
<style>
:root{
  --bg:#F6F7F9; --surface:#FFFFFF; --surface-2:#F9FAFB; --bg-soft:#F9FAFB; --ink:#111827; --ink-soft:#6B7280;
  --line:#E5E7EB; --line-soft:#F1F3F5;
  --primary:#1E3A6E; --primary-soft:#EEF2FB; --primary-ink:#16294E;
  --gold:#AC8438; --gold-soft:#F3EEE1;
  --green:#2E7D55; --green-soft:#E7F3EC; --amber:#B87A1F; --amber-soft:#FBF3E1;
  --red:#C0453F; --red-soft:#FBEAE8; --blue:#2C5B8E; --violet:#6B4E9E;
  --r:14px; --r-sm:10px;
  --sh:0 1px 2px rgba(17,24,39,.04),0 1px 3px rgba(17,24,39,.03);
  --sh-lg:0 12px 44px rgba(17,24,39,.13);
  --serif:'Fraunces','Georgia',serif; --sans:'Inter',system-ui,-apple-system,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
[data-act]{cursor:pointer;-webkit-tap-highlight-color:rgba(30,58,110,.12);touch-action:manipulation}
.drag-handle{cursor:grab;touch-action:none;color:var(--ink-soft);font-size:19px;line-height:1;padding:4px 4px;user-select:none;-webkit-user-select:none;display:flex;align-items:center;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.task.dragging{opacity:.55;background:var(--primary-soft);border-radius:10px}
.task.dragover-top{box-shadow:inset 0 3px 0 var(--primary)}
.task.dragover-bot{box-shadow:inset 0 -3px 0 var(--primary)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dp-grid.rtl{direction:rtl}
.mvbox{margin-top:12px;border:1px solid var(--line);border-radius:14px;background:var(--bg-soft,#FAF8F2);padding:12px}
.mvbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mvtitle{font-weight:700;font-size:14px;color:var(--ink)}
.mvcancel{cursor:pointer;color:var(--ink-soft);font-size:12.5px;font-weight:600}
.mvcrumb{font-size:12px;color:var(--primary);font-weight:600;margin-bottom:6px}
.mvstep{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);margin-bottom:10px}
.mvback{cursor:pointer;color:var(--primary);font-weight:700}
.mvnav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:12px;margin-bottom:7px;cursor:pointer;font-size:13.5px}
.mvdest{background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px;margin-bottom:8px}
.mvdest-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px}
.mvdest-acts{display:flex;gap:8px}
.mvdest-acts .btn{flex:1}
.selbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;cursor:pointer}
.selbox.on{background:var(--primary);border-color:var(--primary)}
.task.selrow{background:var(--primary-soft);border-color:#cdd9ee}
.selbar{background:var(--surface);border:1px solid var(--primary);border-radius:12px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--sh)}
.selbar-top{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--ink);margin-bottom:9px}
.sellink{cursor:pointer;color:var(--primary);font-weight:600;font-size:12.5px}
.selbar-acts{display:flex;gap:7px;flex-wrap:wrap}
.selbar-acts .btn{flex:1;min-width:88px}
.dp-wdh{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:600;padding:2px 0}
.dp-day{border:1px solid var(--line-soft);border-radius:8px;padding:5px 2px;text-align:center;cursor:pointer;background:var(--surface)}
.dp-day.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.dp-day.today{border-color:var(--primary);box-shadow:inset 0 0 0 1px var(--primary)}
.agw{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.agwh{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:600;padding:2px 0}
.agcell{min-height:52px;border:1px solid var(--line-soft);border-radius:8px;padding:4px 3px;cursor:pointer;background:var(--surface);display:flex;flex-direction:column;align-items:center}
.agcell.today{border-color:var(--primary)}
.agcell.has{background:var(--primary-soft);border-color:#cdd9ee}
.agd{font-size:16px;font-weight:700;color:var(--ink);line-height:1.05;font-family:var(--serif)}
.agds{font-size:9px;color:var(--ink-soft);font-weight:600;line-height:1}
.agn{font-size:10.5px;color:var(--primary);font-weight:700;margin-top:1px}
.agb{font-size:8.5px;color:var(--gold);font-weight:700}
.agcell.first{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.agcell.first .agd{color:var(--gold)}
.agw.rtl{direction:rtl}
.dp-day .dp-g{font-size:14px;font-weight:600;line-height:1.1}
.dp-day .dp-h{font-size:10px;color:var(--ink-soft)}
.dp-day.sel .dp-h{color:#dbe4f2}
input,select,textarea{font-family:inherit;font-size:15px}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:680px;margin:0 auto;background:var(--bg);position:relative}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:20}
.hdr-logo{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--primary);letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.hdr-logo .stars{color:var(--gold);font-size:15px}
.hdr-brand{display:flex;flex-direction:column;line-height:1}
.hdr-brand-sub{font-family:var(--sans);font-size:10.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.hdr-spacer{flex:1}
.hdr-year{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line);padding:6px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer}
.hdr-menu-btn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--primary);transition:.15s}
.hdr-menu-btn:active{background:var(--primary-soft)}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:5px;padding:10px 16px 0;font-size:13px;flex-wrap:wrap}
.bc-item{color:var(--ink-soft);cursor:pointer;padding:3px 7px;border-radius:6px;white-space:nowrap;font-weight:500;transition:.12s}
.bc-item:active{background:var(--primary-soft);color:var(--primary)}
.bc-item.active{color:var(--ink);font-weight:600;cursor:default}
.bc-sep{color:var(--line);font-size:11px}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;-webkit-overflow-scrolling:touch}

/* SECTION HEAD */
.sec{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;gap:12px}
.sec-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.sec-title{font-family:var(--serif);font-size:25px;font-weight:600;color:var(--ink);letter-spacing:-.5px;line-height:1.1}
.sec-sub{font-size:13px;color:var(--ink-soft);margin-top:4px}

/* BUTTONS */
.btn{padding:9px 15px;border-radius:var(--r-sm);font-size:14px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:active{background:var(--primary-ink)}
.btn-soft{background:var(--primary-soft);color:var(--primary)}.btn-soft:active{background:#dde7f5}
.btn-ghost{background:var(--surface);color:var(--ink-soft);border:1px solid var(--line)}.btn-ghost:active{background:var(--surface-2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:active{filter:brightness(.94)}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-icon{width:38px;height:38px;padding:0;justify-content:center;border-radius:var(--r-sm)}
.btn-block{width:100%;justify-content:center}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:11px;overflow:hidden;box-shadow:var(--sh);transition:.15s;cursor:pointer}
.card:active{transform:scale(.992);border-color:#d9d0bf}
.card-body{padding:15px 16px;display:flex;align-items:center;gap:13px}
.card-accent{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.card-icon{font-size:23px;flex-shrink:0;line-height:1}
.card-main{flex:1;min-width:0}
.card-name{font-weight:600;font-size:16px;color:var(--ink);letter-spacing:-.2px}
.card-meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-side{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pill{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.pill-budget{background:var(--green-soft);color:var(--green)}
.pill-time{background:var(--gold-soft);color:var(--gold)}
.pill-count{background:var(--primary-soft);color:var(--primary)}
.pill-done{background:var(--green-soft);color:var(--green)}
.pill-mut{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line-soft)}
.progress{height:5px;background:var(--line-soft);overflow:hidden}
.progress-fill{height:100%;transition:width .4s cubic-bezier(.4,0,.2,1)}
.chev{color:var(--line);font-size:19px;flex-shrink:0}

/* MONTH GRID */
.months{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;grid-auto-rows:98px}
.mcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 6px;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--sh);position:relative;overflow:hidden}
.mcard:active{transform:scale(.97)}
.mcard.filled{border-color:#d6ccb8}
.mcard.filled::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--gold))}
.mcard-emoji{font-size:19px;margin-bottom:1px;line-height:1}
.mcard-name{font-weight:600;font-size:13px;color:var(--ink);letter-spacing:-.2px;line-height:1.1}
.mcard-heb{font-size:10.5px;color:var(--ink-soft);margin-top:0;line-height:1.1}
.mcard-count{font-size:10px;color:var(--primary);margin-top:2px;font-weight:600;line-height:1.1}
.mcard-cost{font-size:9.5px;color:var(--gold);font-weight:700;margin-top:1px;line-height:1.1}
.mcard-count.empty{color:#BEB39C}

/* TASK */
.task{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;overflow:hidden;box-shadow:var(--sh)}
.task-main{display:flex;align-items:flex-start;gap:11px;padding:13px 14px}
.check{width:23px;height:23px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;transition:.15s;background:var(--surface)}
.task-content{flex:1;min-width:0;cursor:pointer}
.task-text{font-size:15px;color:var(--ink);line-height:1.4;font-weight:500}
.task-text.done{text-decoration:line-through;color:#A9B2BC;font-weight:400}
.task-tags{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tag{padding:3px 8px;border-radius:7px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.tag-who{background:var(--primary-soft);color:var(--primary)}
.tag-budget{background:var(--green-soft);color:var(--green)}
.tag-time{background:var(--gold-soft);color:var(--gold)}
.tag-qty{background:#FDEEE0;color:#C2691A}
.tag-sub{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line-soft)}
.tag-note{background:var(--surface-2);color:var(--ink-soft);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-acts{display:flex;gap:3px;flex-shrink:0}
.mini-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink-soft);transition:.12s}
.mini-btn:active{background:var(--surface-2)}
.mini-btn.danger:active{background:var(--red-soft);color:var(--red)}
.subs{padding:0 14px 11px 48px;display:flex;flex-direction:column;gap:0}
.subs-deep{padding-left:14px;border-left:2px solid var(--line-soft);margin:2px 0 2px 4px}
.sub{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line-soft)}
.sub-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;background:var(--surface);cursor:pointer}
.sub-text{font-size:13.5px;color:var(--ink-soft);flex:1;cursor:pointer}
.sub-text.done{text-decoration:line-through;color:#B8C0C9}

/* FILTER BAR */
.filters{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);transition:.12s}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* PROGRESS HEADER */
.phead{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:14px;box-shadow:var(--sh)}
.phead-row{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.phead-pct{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--primary)}
.phead-label{font-size:13px;color:var(--ink-soft);flex:1}
.phead-bar{height:7px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.phead-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--primary),var(--blue));transition:width .4s}

/* EMPTY */
.empty{text-align:center;padding:46px 24px;color:var(--ink-soft)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-family:var(--serif);font-size:18px;color:var(--ink);margin-bottom:5px;font-weight:600}
.empty-text{font-size:14px;margin-bottom:18px}

/* BOTTOM NAV */
.bnav{background:var(--surface);border-top:1px solid var(--line);display:flex;flex-shrink:0;padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:20}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:var(--r-sm);color:#A9B0B8;font-size:11px;font-weight:600;transition:.15s}
.bnav-btn .ic{font-size:21px;line-height:1}
.bnav-btn.active{color:var(--primary)}
.bnav-btn.active .ic{transform:translateY(-1px)}

/* FAB */
.fab{position:absolute;right:18px;bottom:calc(78px + env(safe-area-inset-bottom));width:54px;height:54px;border-radius:50%;background:var(--primary);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(30,58,110,.28);z-index:15;transition:.15s}
.fab:active{transform:scale(.92)}

/* MODAL / SHEET */
.overlay{position:fixed;inset:0;background:rgba(28,42,58,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg);border-radius:22px 22px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.16,1,.3,1);box-shadow:var(--sh-lg)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grip{width:38px;height:4px;background:var(--line);border-radius:3px;margin:9px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;position:sticky;top:0;background:var(--bg);z-index:5}
.sheet-title{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink)}
.sheet-body{padding:0 18px 28px}
.sheet-close{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink-soft)}

/* FIELDS */
.field{margin-bottom:16px}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.04em;margin-bottom:7px;text-transform:uppercase}
.input,.textarea,.select{width:100%;background:var(--surface);border:1.5px solid var(--line);color:var(--ink);padding:11px 13px;border-radius:var(--r-sm);outline:none;transition:.15s}
.input:focus,.textarea:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.textarea{resize:vertical;min-height:74px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.row3{display:grid;grid-template-columns:auto 1fr 1fr;gap:9px;align-items:end}

/* SEGMENTED STATUS */
.statuses{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.st-opt{padding:9px 4px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--surface);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:4px;justify-content:center;transition:.12s}
.st-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* DURATION CHIPS */
.dur-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.dur-chip{padding:7px 12px;background:var(--surface);border:1.5px solid var(--line);border-radius:20px;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.12s}
.dur-chip.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* RECURRENCE TOGGLE */
.toggle-group{display:flex;gap:8px}
.toggle-opt{flex:1;padding:12px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--surface);text-align:center;font-size:14px;font-weight:600;color:var(--ink-soft);transition:.12s}
.toggle-opt.active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.toggle-opt .sub{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);margin-top:2px}

/* MATERIAL TYPE */
.mat-types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mat-opt{padding:11px 6px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--surface);text-align:center;font-size:12.5px;font-weight:600;color:var(--ink-soft);transition:.12s}
.mat-opt .em{font-size:20px;display:block;margin-bottom:4px}
.mat-opt.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}

/* SUB-EDIT */
.subedit{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:11px;margin-bottom:9px}
.subedit-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.subedit-num{font-size:12px;font-weight:700;color:var(--gold)}
.subedit-grid{display:grid;grid-template-columns:1fr;gap:8px}
.input-sm{padding:8px 10px;font-size:13.5px;border-radius:8px;border:1.5px solid var(--line);background:var(--surface);width:100%;outline:none}
.input-sm:focus{border-color:var(--primary)}

/* DEP TAGS */
.deps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.dep{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);padding:5px 10px;border-radius:20px;font-size:12.5px;color:var(--ink-soft)}
.dep-x{color:var(--red);font-weight:700;font-size:14px;cursor:pointer}

/* MENU DRAWER */
.drawer{position:fixed;top:0;right:0;bottom:0;width:84%;max-width:340px;background:var(--surface);z-index:110;box-shadow:var(--sh-lg);animation:slidein .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-head{padding:20px 20px 16px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,var(--primary),var(--primary-ink));color:#fff}
.drawer-head .stars{color:var(--gold)}
.drawer-title{font-family:var(--serif);font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px}
.drawer-sub{font-size:13px;opacity:.8;margin-top:3px}
.drawer-body{flex:1;overflow-y:auto;padding:12px}
.drawer-sec{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);padding:14px 12px 6px}
.drawer-item{display:flex;align-items:center;gap:13px;padding:13px 12px;border-radius:var(--r-sm);font-size:15px;font-weight:500;color:var(--ink);transition:.12s;width:100%;text-align:left}
.drawer-item:active{background:var(--surface-2)}
.drawer-item .ic{font-size:20px;width:24px;text-align:center}
.drawer-item .badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--gold-soft);color:var(--gold);padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em}

/* COUNTERS (Journal) */
.counter{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.counter:last-child{border-bottom:none}
.counter-info{display:flex;align-items:center;gap:11px}
.counter-em{font-size:22px}
.counter-name{font-size:15px;font-weight:500;color:var(--ink)}
.counter-ctrl{display:flex;align-items:center;gap:13px}
.cbtn{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1.5px solid var(--line);font-size:20px;color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:600;line-height:1}
.cbtn:active{background:var(--primary-soft)}
.cval{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--ink);min-width:38px;text-align:center}

/* DASHBOARD STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.stat-val{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--primary);line-height:1}
.stat-label{font-size:12.5px;color:var(--ink-soft);margin-top:5px;font-weight:500}
.stat-em{font-size:18px;margin-bottom:8px;display:block}

/* DATE RANGE */
.daterange{display:flex;gap:9px;align-items:end;margin-bottom:14px}

/* TABS */
.tabs{display:flex;gap:5px;background:var(--surface-2);border:1px solid var(--line);padding:4px;border-radius:var(--r-sm);margin-bottom:16px}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--ink-soft);transition:.12s}
.tab.active{background:var(--surface);color:var(--primary);box-shadow:var(--sh)}

/* SHOPPING */
.shop-store{margin-bottom:18px}
.shop-store-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding:0 2px}
.shop-store-name{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
.shop-store-count{font-size:12px;color:var(--ink-soft);background:var(--surface-2);padding:2px 9px;border-radius:12px;border:1px solid var(--line-soft)}
.shop-item{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh)}
.shop-item-main{flex:1;min-width:0}
.shop-item-name{font-size:14.5px;font-weight:500;color:var(--ink)}
.shop-item-meta{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* helper */
.hint{font-size:12.5px;color:var(--ink-soft);background:var(--gold-soft);border:1px solid #ECD9B3;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:14px;line-height:1.45}
.hint b{color:var(--gold)}
.divider{height:1px;background:var(--line);margin:18px 0}
.section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:18px 0 10px}
.reorder-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.reorder-btn{width:28px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line-soft)}
.reorder-btn:active{background:var(--primary-soft);color:var(--primary)}
.group-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--primary);margin:16px 0 9px;display:flex;align-items:center;gap:8px}
.group-title::before{content:'';width:18px;height:2px;background:var(--gold);border-radius:2px}
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;font-size:13.5px;font-weight:500;z-index:200;box-shadow:var(--sh-lg);animation:fade .2s;max-width:90%;text-align:center}
.tmr-pill{position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;background:var(--primary);color:#fff;padding:8px 10px 8px 16px;border-radius:24px;font-size:15px;font-weight:700;z-index:300;box-shadow:var(--sh-lg);cursor:pointer;font-family:var(--serif);letter-spacing:.5px}
.tmr-pill.done{background:var(--red);animation:tmrpulse 1s infinite}
.tmr-pill-x{background:rgba(255,255,255,.25);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
@keyframes tmrpulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>

<body>
<div class="app" id="app"></div>
<div id="overlay-root"></div>
<div id="toast-root"></div>
<div id="timer-root"></div>
<script>
/* ============================================================
   MARBITZ V1.1 — Moteur d'organisation du Beth Habad
   ============================================================ */

// ---------- UTILS ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtM = m => { if(!m) return ''; if(m<60) return m+'min'; const h=Math.floor(m/60), r=m%60; return r? h+'h'+String(r).padStart(2,'0') : h+'h'; };
const fmtE = n => n ? Number(n).toLocaleString('fr-FR')+' €' : '';

// Toutes les sous-tâches sont des "items" avec la même forme qu'une tâche (récursif)
function totalDuration(t){
  if(t.subtasks && t.subtasks.length) return t.subtasks.reduce((a,s)=>a+totalDuration(s),0);
  return t.duration||0;
}
function totalBudget(t){
  let b = (t.budget && t.budget.amount) || 0;
  if(t.subtasks) b += t.subtasks.reduce((a,s)=>a+totalBudget(s),0);
  return b;
}
const sumDur = arr => (arr||[]).reduce((a,t)=>a+totalDuration(t),0);
const sumBud = arr => (arr||[]).reduce((a,t)=>a+totalBudget(t),0);
const countDone = arr => (arr||[]).filter(t=>t.status==='done').length;

// ---------- CONSTANTES ----------
const MONTHS = [
  {id:'tishri',name:'Tishri',heb:'תשרי',emoji:'🍎'},{id:'heshvan',name:'Heshvan',heb:'חשון',emoji:'🌧️'},
  {id:'kislev',name:'Kislev',heb:'כסלו',emoji:'🕎'},{id:'tevet',name:'Tevet',heb:'טבת',emoji:'❄️'},
  {id:'shvat',name:'Shvat',heb:'שבט',emoji:'🌱'},{id:'adar',name:'Adar',heb:'אדר',emoji:'🎭'},
  {id:'nissan',name:'Nissan',heb:'ניסן',emoji:'🌸'},{id:'iyar',name:'Iyar',heb:'אייר',emoji:'☀️'},
  {id:'sivan',name:'Sivan',heb:'סיון',emoji:'📜'},{id:'tamuz',name:'Tamuz',heb:'תמוז',emoji:'🌞'},
  {id:'av',name:'Av',heb:'אב',emoji:'🕯️'},{id:'elul',name:'Elul',heb:'אלול',emoji:'🔔'}
];
const THEMES = ['Nourriture','Salle','Personnel','Impression','Décoration','Transport','Divers'];
const STATUSES = [
  {id:'todo',label:'À faire',c:'#A9B0B8'},{id:'inprogress',label:'En cours',c:'#2C5B8E'},
  {id:'done',label:'Fait',c:'#2E7D55'}
];
const MAT = [{id:'buy',em:'🛒',label:'À acheter'},{id:'bring',em:'🏠',label:'À apporter'},{id:'onsite',em:'🏛️',label:'Sur place'}];

const stOf = id => STATUSES.find(s=>s.id===id) || STATUSES[0];
const nextSt = id => { const i=STATUSES.findIndex(s=>s.id===id); return STATUSES[(i+1)%STATUSES.length].id; };

// ---------- FABRIQUES ----------
function mkTask(text=''){
  return {id:uid(),text,responsible:'',status:'todo',duration:0,dependsOn:[],subtasks:[],notes:'',date:'',
    budget:{amount:0,theme:'Divers'},
    material:{type:'buy',note:'',lines:[]},
    recurring:false,reminders:[30],debrief:''};   // debrief : note post-événement (bien / pas bien / à améliorer)
}
function mkEvent(name=''){ return {id:uid(),name,date:'',recurring:false,tasks:[],report:'',public:''}; }   // report : compte rendu ; public : audience visée
function mkFete(name='',color='#1E3A6E'){ return {id:uid(),name,color,date:'',recurring:false,events:[]}; }
function mkProgram(name='',color='#2C5B8E'){ return {id:uid(),name,color,date:'',events:[],sessions:[],animateurs:[],absences:{}}; }

// ---------- ÉTAT ----------
let D = null;
let nav = {view:'journal', monthId:null, feteId:null, eventId:null, ctx:'fete'}; // ctx: fete|program
let jTab = 'tasks';
let taskFilter = 'all';
let drawerOpen = false;
let sheet = null;       // {type, ...}
let editBuf = null;     // buffer d'édition de tâche
let tplBuf=null;        // buffer d'édition de modèle
let moveNav=null;       // explorateur de réattribution {mId,fId,pId}
let datePicker=null;    // sélecteur de date hébraïque
let progYM=null;        // mois affiché dans Présences & Salaires
let progGen=false;      // formulaire de génération de journées
let childFilter='all'; let childDay=null; // présences enfants
let agMode='civil'; let agAnchor=null; // agenda fusionné
let jDay=null; let childBulk=false; let progDates=false; // nav jour + ajout groupé + import dates
let _tmrTotal=0,_tmrLeft=0,_tmrRun=false,_tmrIv=null,_tmrEnd=0,_tmrTaskText='',_tmrDone=false,_tmrAudio=null; // minuteur
let coachMsgs=[];       // historique du chat coach
let lang='fr';          // langue de l'interface (fr/he/en)
let dashRange = 'today';
let journalKey = todayKey();  // jour affiché dans Compte rendu
let groupedView = null; // résultat du tri intelligent {mode, groups}
let shopRange='all'; // filtre échéance de la liste de courses
let selMode=false; let selSet={}; // sélection multiple de tâches

// ---------- PERSISTANCE (robuste : fallback mémoire si localStorage bloqué) ----------
let _memStore = {};
let _lsOK = (()=>{ try{ const k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); return true; }catch(e){ return false; } })();
function save(){
  try{ if(_lsOK) localStorage.setItem('marbitz-v11', JSON.stringify(D)); else _memStore['marbitz-v11']=JSON.stringify(D); }
  catch(e){ _memStore['marbitz-v11']=JSON.stringify(D); }
}
function load(){
  try{
    const s = _lsOK ? localStorage.getItem('marbitz-v11') : _memStore['marbitz-v11'];
    if(s){ D=JSON.parse(s); return true; }
  }catch(e){}
  return false;
}

// ---------- TOAST ----------
let toastTimer=null;
function toast(msg){
  const r=$('toast-root');
  r.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{r.innerHTML='';},2200);
}

// ---------- ACCÈS ----------
function curMonth(){ return D.months[nav.monthId]; }
function curFete(){ const m=curMonth(); return m? m.fetes.find(f=>f.id===nav.feteId):null; }
function curProgram(){ return D.programs.find(p=>p.id===nav.feteId); }
function curContainer(){ return nav.ctx==='program'? curProgram() : curFete(); }
function curEvent(){ const c=curContainer(); return c? c.events.find(e=>e.id===nav.eventId):null; }

// recherche récursive d'une tâche par id dans tout l'arbre
function findTaskAnywhere(tid){
  let res=null;
  const walk=(arr,loc)=>{ for(const t of arr){ if(t.id===tid){res={task:t,loc};return;} if(t.subtasks&&t.subtasks.length) walk(t.subtasks,{...loc,parent:t}); if(res)return; } };
  Object.entries(D.months).forEach(([mId,m])=>{ if(!res && m.tasks)walk(m.tasks,{mId,ctx:'month'}); m.fetes.forEach(f=>{ if(!res && f.tasks)walk(f.tasks,{mId,fId:f.id,ctx:'fete',contTask:true}); f.events.forEach(e=>{ if(!res)walk(e.tasks,{mId,fId:f.id,eId:e.id,ctx:'fete'}); }); }); });
  D.programs.forEach(p=>{ if(!res && p.tasks)walk(p.tasks,{pId:p.id,ctx:'program',contTask:true}); p.events.forEach(e=>{ if(!res)walk(e.tasks,{pId:p.id,eId:e.id,ctx:'program'}); }); });
  return res;
}

// navigation
function setView(v){ nav={view:v,monthId:null,feteId:null,eventId:null,ctx:'fete'}; groupedView=null; selMode=false; selSet={}; render(); }
function go(patch){ nav={...nav,...patch}; groupedView=null; selMode=false; selSet={}; render(); }
function changeYear(y){ D.year=parseInt(y); ensureRecurring(D.year); save(); render(); }

// ============================================================
//  DONNÉES INITIALES (Tishri pré-rempli) + RÉCURRENCE
// ============================================================
function seedData(){
  const D = {
    year:5787, schemaYear:5787,
    people:['Toi','Arki','Sahdon','Yigal Rehana','Steve','Rudi','Simoni/Marssiano','Hazan','Bénévole','Pinchas Asoulim','Jeunes','Bahourim'],
    stores:['Carrefour','Amazon','Cash & Carry','Pro Emballage','Marché'],
    locations:['Maison','Beth Habad','Dépôt','Magasin'],
    months:{}, programs:[], journal:{},
    eventTemplates:[
      {id:'tmpl-repas', name:'Repas / Kidoush type', items:[
        {text:'Nappes', material:{type:'onsite',note:'Placard du fond'}},
        {text:'Assiettes', material:{type:'buy',store:'Carrefour'}},
        {text:'Nourriture', subs:['Plateaux','Salades']},
        {text:'Boissons', subs:['Coca Zéro','Eau','Jus']},
        {text:'Alcool', subs:['Bourrat','Black Label']},
        {text:'Invités', note:'Liste des invités, nombre de couverts'}
      ]}
    ]
  };
  D.months.tishri = {fetes:[
    fete_eloul(), fete_rh(), fete_kaparot(), fete_yk(), fete_sukkot(), fete_st()
  ]};
  D.programs = [ mkProgramSeed() ];
  return D;
}

function T(text,opt={}){
  const t=mkTask(text);
  if(opt.who) t.responsible=opt.who;
  if(opt.dur) t.duration=opt.dur;
  if(opt.notes) t.notes=opt.notes;
  if(opt.budget) t.budget={amount:opt.budget,theme:opt.theme||'Divers'};
  if(opt.qty) t.material={value:opt.qty,unit:opt.unit||'',type:opt.mat||'buy',store:opt.store||'',note:opt.matnote||''};
  if(opt.deps) t.dependsOn=opt.deps;
  if(opt.rec) t.recurring=true;
  if(opt.subs) t.subtasks=opt.subs.map(s=>{ const st=mkTask(typeof s==='string'?s:s.text); if(typeof s==='object'){ if(s.dur)st.duration=s.dur; if(s.who)st.responsible=s.who; } return st; });
  return t;
}

function fete_eloul(){
  const f=mkFete('🌙 Éloul — Préparation','#6B4E9E'); f.recurring=true;
  f.events=[{id:uid(),name:'Préparation générale',recurring:true,tasks:[

    T('Acheter bonbons + préparer sachets',{who:'Simoni/Marssiano',budget:50,theme:'Nourriture',qty:180,unit:'sachets',mat:'buy',store:'Carrefour',rec:1,subs:[{text:'Acheter bonbons non-collants',dur:30},{text:'Préparer et remplir les sachets',dur:30}]}),
    T('Feuille de vente des zkhuyot (mitsvot, Oneg Shabbat, TT)',{who:'Toi',dur:45,theme:'Impression',rec:1}),
    T('Affiche + annonces shofar au parc',{who:'Toi',dur:30,theme:'Impression',rec:1}),
    T('Confirmer Hazan : Yossef Partouche',{who:'Toi',dur:20,budget:1100,theme:'Personnel',notes:'Pourboire : 100 € cash ou 300 € avec reçu. À reconduire.',rec:1}),
    T('Commander Kaparot',{who:'Toi',dur:15,notes:'0749117307 / 0750356540 — 25 coqs + 25 poules',qty:50,unit:'poules',rec:1}),
    T('Publier Kaparot — lien EN LIGNE uniquement',{who:'Toi',dur:20,notes:'Éviter confusion avec inscription sur place',rec:1}),
    T('Autorisation sukkah communautaire',{who:'Toi',dur:30,rec:1}),

  return f;

  return f;

function fete_kaparot(){
  const f=mkFete('🐓 Kaparot','#B23B6E'); f.recurring=true;
  f.events=[{id:uid(),name:'Logistique Kaparot',recurring:true,tasks:[

function fete_yk(){
  const f=mkFete('⚪ Yom Kippour','#B23B3B'); f.recurring=true;
  f.events=[{id:uid(),name:'Préparation Yom Kippour',recurring:true,tasks:[

// ---------- RÉCURRENCE ----------
// Réinitialise/duplique les éléments récurrents pour l'année cible.
// Stratégie V1.1 : chaque année a son propre arbre. Si une année n'existe pas encore,
// on clone les éléments récurrents de l'année modèle, statuts remis à zéro.
function ensureRecurring(year){
  // On stocke par année dans D.byYear ; D.months pointe vers l'année courante.
  if(!D.byYear) D.byYear = {};
  // Sauver l'état courant dans l'année précédemment active
  if(D._activeYear && D._activeYear!==year){
    D.byYear[D._activeYear] = {months:D.months, programs:D.programs, journal:D.journal};
  }
  if(D.byYear[year]){
    const y=D.byYear[year]; D.months=y.months; D.programs=y.programs; D.journal=y.journal||{};
  } else {
    // créer l'année à partir des récurrents de l'année modèle active
    const src = D._activeYear ? (D.byYear[D._activeYear]||{months:D.months,programs:D.programs}) : {months:D.months,programs:D.programs};
    D.months = cloneRecurringMonths(src.months);
    D.programs = (src.programs||[]).map(cloneProgramShell);
    D.journal = {};
  }
  D._activeYear = year;
}
function resetStatus(t){ const c={...t,status:'todo'}; if(t.subtasks) c.subtasks=t.subtasks.map(resetStatus); c.id=uid(); return c; }
function cloneRecurringMonths(months){
  const out={};
  Object.entries(months||{}).forEach(([mId,m])=>{
    const fetes=(m.fetes||[]).filter(f=>f.recurring).map(f=>({
      ...f,id:uid(),
      events:f.events.filter(e=>e.recurring!==false).map(e=>({
        ...e,id:uid(),
        tasks:e.tasks.filter(t=>t.recurring).map(resetStatus)
      }))
    }));
    if(fetes.length) out[mId]={fetes};
  });
  return out;
}
function cloneProgramShell(p){ return {...p,id:uid(),events:[],sessions:[],absences:{}}; }

function renderHome(c){
  let html=`<div class="sec"><div><div class="sec-eyebrow">${t('Année','שנה','Year')} ${D.year}</div><div class="sec-title">${t('Calendrier hébraïque','לוח עברי','Hebrew Calendar')}</div></div></div>`;
  html+=`<div class="months">`;
  MONTHS.forEach(m=>{
    const md=D.months[m.id];
    let tot=0,dn=0,bud=0,remMin=0;
    if(md) md.fetes.forEach(f=>f.events.forEach(e=>{tot+=countAll(e.tasks);dn+=countAllDone(e.tasks);bud+=sumBud(e.tasks);remMin+=sumRemDur(e.tasks);}));
    if(md&&md.tasks){tot+=countAll(md.tasks);dn+=countAllDone(md.tasks);bud+=sumBud(md.tasks);remMin+=sumRemDur(md.tasks);}
    programsInMonth(m.id).forEach(p=>{ bud+=programCost(p); remMin+=programRem(p); });
    const filled=md&&md.fetes.length;
    html+=`<div class="mcard ${filled?'filled':''}" data-act="go({monthId:'${m.id}',feteId:null,eventId:null})">
      <div class="mcard-emoji">${m.emoji}</div>
      <div class="mcard-name">${m.name}</div>
      <div class="mcard-heb">${m.heb}</div>
      <div class="mcard-count ${tot?'':'empty'}">${tot? dn+'/'+tot:'—'}</div>
      ${tot?`<div class="mcard-cost">${fmtE(bud)}${remMin?' · '+fmtM(remMin):''}</div>`:''}
    </div>`;
  });
  html+=`</div>`;
  c.innerHTML=html;
}
function countAll(tasks){ let n=0; (tasks||[]).forEach(t=>{n++; if(t.subtasks)n+=countAll(t.subtasks);}); return n; }
function countAllDone(tasks){ let n=0; (tasks||[]).forEach(t=>{if(t.status==='done')n++; if(t.subtasks)n+=countAllDone(t.subtasks);}); return n; }
function remainingDur(t){ if(t.subtasks&&t.subtasks.length) return t.subtasks.reduce((a,s)=>a+remainingDur(s),0); return t.status==='done'?0:(t.duration||0); }
const sumRemDur = arr => (arr||[]).reduce((a,t)=>a+remainingDur(t),0);
function programCost(p){ return (p.events||[]).reduce((a,e)=>a+sumBud(e.tasks),0); }
function programRem(p){ return (p.events||[]).reduce((a,e)=>a+sumRemDur(e.tasks),0); }
function hebMonthIdOf(iso){
  if(!iso) return null;
  try{
    const parts=new Intl.DateTimeFormat('en-u-ca-hebrew',{month:'long'}).formatToParts(new Date(iso+'T12:00:00'));
    let nm=((parts.find(p=>p.type==='month')||{}).value||'').toLowerCase().replace(/[\s.]/g,'');
    const map={tishri:'tishri',heshvan:'heshvan',cheshvan:'heshvan',marcheshvan:'heshvan',kislev:'kislev',tevet:'tevet',shevat:'shvat',shvat:'shvat',adar:'adar',adari:'adar',adarii:'adar',nisan:'nissan',nissan:'nissan',iyar:'iyar',iyyar:'iyar',sivan:'sivan',tamuz:'tamuz',tammuz:'tamuz',av:'av',elul:'elul'};
    return map[nm]||null;
  }catch(e){ return null; }
}
function programsInMonth(mId){ return (D.programs||[]).filter(p=>p.date && hebMonthIdOf(p.date)===mId); }

function dbSync(){ // récupère TOUTES les zones de texte du débrief avant fermeture (anti-perte de saisie)
  const ev=curEvent(); if(!ev) return;
  document.querySelectorAll('.db-task').forEach(el=>{ const r=findTaskAnywhere(el.getAttribute('data-tid')); if(r) r.task.debrief=el.value; });

function sortByDate(arr){ return arr.map((x,i)=>[x,i]).sort((a,b)=>{ const da=a[0].date||'', db=b[0].date||''; if(da&&db){ if(da!==db) return da<db?-1:1; return a[1]-b[1]; } if(da&&!db) return -1; if(!da&&db) return 1; return a[1]-b[1]; }).map(p=>p[0]); }
function sortByDeps(arr){
  const ids=new Set(arr.map(t=>t.id));
  const placed=new Set(); const out=[]; const remaining=arr.slice(); let guard=0;
  while(remaining.length && guard++<10000){
    let progressed=false;
    for(let i=0;i<remaining.length;i++){
      const t=remaining[i];
      const deps=(t.dependsOn||[]).filter(d=>ids.has(d));
      if(deps.every(d=>placed.has(d))){ out.push(t); placed.add(t.id); remaining.splice(i,1); progressed=true; break; }
    }
    if(!progressed){ remaining.forEach(t=>{ out.push(t); placed.add(t.id); }); break; }
  }
  return out;
}

function subHTML(s,parent){

// ---------- toggle / move / delete ----------
function toggleTask(tid){
  const r=findTaskAnywhere(tid); if(!r)return;
  r.task.status=nextSt(r.task.status); save(); render();
}
function delTask(tid){
  const r=findTaskAnywhere(tid); if(!r)return;
  if(!confirm('Supprimer « '+r.task.text+' » ?'))return;
  const arr = r.loc.parent ? r.loc.parent.subtasks : containerTasks(r.loc);
  const i=arr.findIndex(x=>x.id===tid); if(i>=0)arr.splice(i,1);
  save(); render(); toast('Tâche supprimée');
}
function containerTasks(loc){
  if(loc.contTask){ if(loc.pId){ const p=D.programs.find(x=>x.id===loc.pId); if(!p.tasks)p.tasks=[]; return p.tasks; } const m=D.months[loc.mId]; const f=m.fetes.find(x=>x.id===loc.fId); if(!f.tasks)f.tasks=[]; return f.tasks; }
  if(loc.ctx==='month'){ const m=D.months[loc.mId]; if(!m.tasks)m.tasks=[]; return m.tasks; }
  if(loc.ctx==='program'){ const p=D.programs.find(x=>x.id===loc.pId); const e=p.events.find(x=>x.id===loc.eId); return e.tasks; }
  const m=D.months[loc.mId]; const f=m.fetes.find(x=>x.id===loc.fId); const e=f.events.find(x=>x.id===loc.eId); return e.tasks;
}
function moveTask(tid,dir){
  const ev=curEvent(); if(!ev)return;
  const i=ev.tasks.findIndex(t=>t.id===tid); if(i<0)return;
  const j=i+dir; if(j<0||j>=ev.tasks.length)return;
  [ev.tasks[i],ev.tasks[j]]=[ev.tasks[j],ev.tasks[i]];
  save(); render();
}

function coachAnswer(q){

function qaTaskTo(v){ if(!v)return; const pr=v.split('|');

function _destTasksArray(dest){
  if(dest==='here'){ const e=curEvent(); if(e)return e.tasks; const c=curContainer(); if(c){ if(!c.tasks)c.tasks=[]; return c.tasks; } return null; }
  const pr=(dest||'').split('|');
  if(pr[0]==='month'){ const mId=pr[1]; if(!D.months[mId])D.months[mId]={fetes:[]}; if(!D.months[mId].tasks)D.months[mId].tasks=[]; return D.months[mId].tasks; }
  if(pr[0]==='program'){ const p=D.programs.find(x=>x.id===pr[1]); if(!p)return null; if(!p.tasks)p.tasks=[]; return p.tasks; }
  if(pr[0]==='ev'){ const e=destEvent(dest.slice(3)); return e?e.tasks:null; }
  return null;
}
function doImportList(){ const ta=$('imp-list'); const ds=$('imp-dest'); if(!ta)return; const dest=ds?ds.value:'here'; const arr=_destTasksArray(dest); if(!arr){ toast('Choisis une destination'); return; } let n=0; ta.value.split(/\r?\n/).forEach(line=>{ let name=line; if(name.indexOf('\t')>=0)name=name.split('\t')[0]; name=name.trim(); if(!name)return; if(/^(niveau|type|nom|t[âa]che)s?$/i.test(name))return; name=name.replace(/^[•\-\*•\d\.\)\s]+/,'').trim(); if(!name)return; arr.push(mkTask(name)); n++; }); if(!n){ toast('Aucune tâche détectée'); return; } save(); closeSheet(); render(); toast(n+' tâche(s) importée(s) ✓'); }

// ============================================================
function openTask(tid){
  const r=findTaskAnywhere(tid); if(!r)return;
  editBuf=JSON.parse(JSON.stringify(r.task));
  editBuf._loc=r.loc; editBuf._isSub=!!r.loc.parent; editBuf._parentId=r.loc.parent?r.loc.parent.id:null;
  moveNav=null;
  sheet={type:'task'}; renderOverlay();
}
// Ajout rapide façon Google Tasks : juste l'intitulé, puis « Plus d'options » déplie l'éditeur complet.
function openQuickTask(tid){
  const r=findTaskAnywhere(tid); if(!r)return;
  editBuf=JSON.parse(JSON.stringify(r.task));
  editBuf._loc=r.loc; editBuf._isSub=!!r.loc.parent; editBuf._parentId=r.loc.parent?r.loc.parent.id:null;
  editBuf._new=true; moveNav=null;
  sheet={type:'quickTask'}; renderOverlay();
  setTimeout(()=>{ const e=$('qt-text'); if(e){ e.focus(); } },60);
}
function quickTaskSheet(){
  const t=editBuf;
  return `<div class="sheet-head"><div class="sheet-title">Nouvelle tâche</div><button class="sheet-close" data-act="quickTaskCancel()">✕</button></div>
  <div class="sheet-body">
    <input class="input" id="qt-text" value="${esc(t.text||'')}" placeholder="Qu'y a-t-il à faire ?" style="font-size:16px" onkeydown="if(event.key==='Enter'){event.preventDefault();quickTaskSave();}">
    <div class="hint" style="margin-top:8px">Astuce : Entrée pour ajouter. Rappel J-30 mis par défaut.</div>
    <button class="btn btn-primary btn-block" style="margin-top:14px" data-act="quickTaskSave()">Ajouter</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" data-act="quickTaskMore()">⌄ Plus d'options</button>
  </div>`;
}
function quickTaskSync(){ const el=$('qt-text'); if(el) editBuf.text=el.value; }
function quickTaskSave(){ quickTaskSync(); saveTask(true); closeSheet(); render(); toast('Tâche ajoutée ✓'); }
function quickTaskMore(){ quickTaskSync(); sheet={type:'task'}; renderOverlay(); }
function quickTaskCancel(){ quickTaskSync(); if(!editBuf.text||!editBuf.text.trim()){ try{ const loc=editBuf._loc; const arr=(loc&&loc.parent)?loc.parent.subtasks:containerTasks(loc); const i=arr.findIndex(x=>x.id===editBuf.id); if(i>=0)arr.splice(i,1); save(); }catch(e){} } else { saveTask(true); } closeSheet(); render(); }
function taskSheet(){
  const t=editBuf;
  const _eff = t.date || effectiveDate(t,t._loc);
  const _dnote = _eff ? ('📅 '+civilDate(_eff)+'<br>🕎 '+hebrewDate(_eff)+(t.date?'':' — date héritée')) : 'Aucune date — héritera de la fête / événement si tu en définis une.';
  // tâches sœurs pour dépendances (même conteneur, hors elle-même)
  let siblings=[];
  const ev=eventOfLoc(t._loc);
  if(ev) siblings=flattenTasks(ev.tasks).filter(x=>x.id!==t.id);

  <div class="sheet-head"><div class="sheet-title">${t._tplItem!=null?'Tâche du modèle':(t._isSub?'Sous-tâche':'Tâche')}</div><button class="sheet-close" data-act="closeSheet()">✕</button></div>

    <div class="row2">
      <div class="field"><label class="field-label">Responsable</label>
        <input class="input" id="f-who" list="dl-people" value="${esc(t.responsible||'')}" placeholder="Qui ?">
        <datalist id="dl-people">${D.people.map(p=>`<option value="${esc(p)}">`).join('')}</datalist></div>
      <div class="field"><label class="field-label">Durée</label>
        <div class="dur-chips">${[5,15,25,60].map(d=>`<button class="dur-chip ${t.duration===d?'active':''}" data-act="ebSet('duration',${d})">${fmtM(d)}</button>`).join('')}</div>

    </div>

${t._tplItem!=null?'':`    <div class="field"><label class="field-label">Échéance — date civile ou hébraïque</label>

        <input class="input" id="f-date" type="date" value="${t.date||''}" onchange="syncInputs();renderOverlay()" style="flex:1">

      <div style="display:flex;gap:7px;margin-top:7px;align-items:center">

    </div>

    <div class="divider"></div>
    <div class="section-label">Matériel</div>

      <div class="field"><div class="deps">${(t.dependsOn||[]).map(id=>{const d=siblings.find(s=>s.id===id);return d?`<span class="dep">${esc(d.text.slice(0,28))}<span class="dep-x" data-act="ebRmDep('${id}')">✕</span></span>`:''}).join('')}</div>
      <select class="select" onchange="ebAddDep(this.value);this.value=''"><option value="">+ Cette tâche dépend de…</option>${siblings.filter(s=>!(t.dependsOn||[]).includes(s.id)).map(s=>`<option value="${s.id}">${esc(s.text.slice(0,44))}</option>`).join('')}</select></div>`:''}

    ${!promote&&siblings.length?`<div class="field"><select class="select" onchange="ebDemote(this.value);this.value=''"><option value="">⬇ Transformer en sous-tâche de…</option>${siblings.filter(s=>!isDescendant(t,s.id)).map(s=>`<option value="${s.id}">${esc(s.text.slice(0,44))}</option>`).join('')}</select></div>`:''}



    ${t._tplItem!=null?'':`<button class="btn btn-ghost btn-block" style="margin-top:14px" data-act="openExport('task')">⬇ Exporter cette tâche</button>`}

}

// localiser l'event d'une loc
function eventOfLoc(loc){
  if(!loc)return null;
  if(loc.ctx==='program'){ const p=D.programs.find(x=>x.id===loc.pId); return p?p.events.find(e=>e.id===loc.eId):null; }
  const m=D.months[loc.mId]; if(!m)return null; const f=m.fetes.find(x=>x.id===loc.fId); return f?f.events.find(e=>e.id===loc.eId):null;
}
function hebrewDate(iso){ if(!iso) return ''; try{ const d=new Date(iso+'T12:00:00'); const parts=new Intl.DateTimeFormat('en-u-ca-hebrew',{day:'numeric',year:'numeric'}).formatToParts(d); let day='',year=''; parts.forEach(p=>{if(p.type==='day')day=p.value;if(p.type==='year')year=p.value;}); const mid=hebMonthIdOf(iso); const mo=MONTHS.find(x=>x.id===mid); const moName=mo?mo.name:new Intl.DateTimeFormat('en-u-ca-hebrew',{month:'long'}).format(d); return day+' '+moName+' '+year; }catch(e){ return ''; } }
function civilDate(iso){ if(!iso) return ''; try{ return new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }catch(e){ return iso; } }
function feteOfLoc(loc){ if(!loc||loc.ctx==='program') return null; const m=D.months[loc.mId]; if(!m) return null; return m.fetes.find(x=>x.id===loc.fId)||null; }
function effectiveDate(task,loc){ if(task&&task.date) return task.date; const ev=eventOfLoc(loc); if(ev&&ev.date) return ev.date; const f=feteOfLoc(loc); if(f&&f.date) return f.date; if(loc&&loc.ctx==='program'){ const p=D.programs.find(x=>x.id===loc.pId); if(p&&p.date) return p.date; } return ''; }
function parentLabel(loc){ if(!loc) return ''; if(loc.ctx==='program'){ const p=D.programs.find(x=>x.id===loc.pId); const ev=eventOfLoc(loc); return (p?p.name:'')+(ev?' › '+ev.name:''); } const m=MONTHS.find(x=>x.id===loc.mId); const f=feteOfLoc(loc); const ev=eventOfLoc(loc); return (m?m.emoji+' '+m.name:'')+(f?' › '+f.name:'')+(ev?' › '+ev.name:''); }
function setContainerDate(val){ const c=curContainer(); if(c){ c.date=val; save(); render(); } }
function setEventDate(val){ const e=curEvent(); if(e){ e.date=val; save(); render(); } }
function flattenTasks(arr,out=[]){ (arr||[]).forEach(t=>{out.push(t); if(t.subtasks)flattenTasks(t.subtasks,out);}); return out; }
function isDescendant(task,id){ // id est-il dans le sous-arbre de task ?
  if(task.id===id)return true;
  return (task.subtasks||[]).some(s=>isDescendant(s,id));
}

// ---------- édition buffer ----------
function ebSet(k,v){ syncInputs(); editBuf[k]=v; renderOverlay(); }
function reminderDate(effIso,n){ const d=new Date(effIso+'T12:00:00'); d.setDate(d.getDate()-n); return todayKey(d); }
// un rappel peut être un nombre de jours avant (J-N) OU une date absolue (chaîne ISO)
function remIso(eff,r){ return (typeof r==='number') ? (eff?reminderDate(eff,r):'') : r; }
function remLabel(r){ if(typeof r==='number') return 'J-'+r; try{ return '📅 '+new Date(r+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }catch(e){ return r; } }
function ebToggleReminder(n){ syncInputs(); if(!Array.isArray(editBuf.reminders))editBuf.reminders=[]; const i=editBuf.reminders.indexOf(n); if(i>=0)editBuf.reminders.splice(i,1); else editBuf.reminders.push(n); renderOverlay(); }
function ebAddReminder(){ syncInputs(); const el=$('f-rem'); if(!el)return; const n=parseInt(el.value); if(!n||n<0){toast('Entre un nombre de jours');return;} if(!Array.isArray(editBuf.reminders))editBuf.reminders=[]; if(!editBuf.reminders.includes(n))editBuf.reminders.push(n); renderOverlay(); }
function ebRmReminder(r){ syncInputs(); if(!Array.isArray(editBuf.reminders))return; editBuf.reminders=editBuf.reminders.filter(x=>String(x)!==String(r)); renderOverlay(); }
function ebSetMat(k,v){ syncInputs(); if(!editBuf.material)editBuf.material={type:'buy'}; editBuf.material[k]=v; renderOverlay(); }
function matLineHTML(ln,i){
  return `<div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:7px">
    <div class="field" style="margin:0;flex:0 0 60px"><label class="field-label">Qté</label><input class="input" id="ml-qty-${i}" type="number" value="${ln.qty||''}" placeholder="0"></div>
    <div class="field" style="margin:0;flex:1;min-width:0"><label class="field-label">Produit</label><input class="input" id="ml-prod-${i}" value="${esc(ln.product||'')}" placeholder="Produit"></div>
    <div class="field" style="margin:0;flex:1;min-width:0"><label class="field-label">Magasin</label><input class="input" id="ml-store-${i}" list="dl-stores" value="${esc(ln.store||'')}" placeholder="Où ?"></div>
    <button class="mini-btn danger" data-act="ebRmMatLine(${i})" style="flex:0 0 auto;margin-bottom:3px">🗑</button>
  </div>`;
}
function ebSyncMatLines(){ if(!editBuf)return; if(!editBuf.material)editBuf.material={type:'buy'}; if(!Array.isArray(editBuf.material.lines))editBuf.material.lines=[]; editBuf.material.lines.forEach((ln,i)=>{ const q=$('ml-qty-'+i),p=$('ml-prod-'+i),s=$('ml-store-'+i); if(q)ln.qty=q.value; if(p)ln.product=p.value; if(s)ln.store=s.value; }); }
function ebAddMatLine(){ syncInputs(); ebSyncMatLines(); editBuf.material.lines.push({qty:'',product:'',store:''}); renderOverlay(); }
function ebRmMatLine(i){ syncInputs(); ebSyncMatLines(); editBuf.material.lines.splice(i,1); renderOverlay(); }
function syncInputs(){ // récupère les champs texte avant un re-render destructif
  const g=id=>{const el=$(id);return el?el.value:null;};
  if($('f-text')!=null) editBuf.text=g('f-text');
  if($('f-who')!=null) editBuf.responsible=g('f-who');
  if($('f-dur')!=null) editBuf.duration=parseInt(g('f-dur'))||0;
  if($('f-bud')!=null){ if(!editBuf.budget)editBuf.budget={theme:'Divers'}; editBuf.budget.amount=parseFloat(g('f-bud'))||0; }
  if($('f-theme')!=null){ if(!editBuf.budget)editBuf.budget={amount:0}; editBuf.budget.theme=g('f-theme'); }
  ebSyncMatLines();
  if($('f-matnote')!=null){ if(!editBuf.material)editBuf.material={type:'buy'}; editBuf.material.note=g('f-matnote'); }
  if($('f-notes')!=null) editBuf.notes=g('f-notes');
  if($('f-date')!=null) editBuf.date=g('f-date');
}
function ebAddDep(id){ syncInputs(); if(!editBuf.dependsOn)editBuf.dependsOn=[]; if(id&&!editBuf.dependsOn.includes(id))editBuf.dependsOn.push(id); renderOverlay(); }
function ebRmDep(id){ syncInputs(); editBuf.dependsOn=(editBuf.dependsOn||[]).filter(x=>x!==id); renderOverlay(); }
function ebAddSub(){ syncInputs(); if(!editBuf.subtasks)editBuf.subtasks=[]; editBuf.subtasks.push(mkTask('')); renderOverlay(); }
function ebRmSub(id){ syncInputs(); editBuf.subtasks=editBuf.subtasks.filter(s=>s.id!==id); renderOverlay(); }
function ebSubField(id,k,v){ const s=editBuf.subtasks.find(x=>x.id===id); if(!s)return; s[k]= k==='duration'?(parseInt(v)||0):v; }
function ebOpenSub(id){ // ouvrir une sous-tâche dans l'éditeur complet (sauve le parent d'abord)
  syncInputs(); saveTask(true);
  // après save, retrouver et ouvrir
  setTimeout(()=>openTask(id),0);
}

// promotion / rétrogradation
function ebPromote(){ syncInputs(); saveTask(true); promoteTask(editBuf.id); toast('Transformée en tâche principale'); setTimeout(()=>openTask(editBuf.id),0); }
function ebDemote(targetId){ if(!targetId)return; syncInputs(); saveTask(true); demoteTask(editBuf.id,targetId); toast('Transformée en sous-tâche'); setTimeout(()=>openTask(editBuf.id),0); }

function promoteTask(tid){
  const r=findTaskAnywhere(tid); if(!r||!r.loc.parent)return;
  const parent=r.loc.parent;
  const ev=eventOfLoc(r.loc);
  // retirer du parent
  const i=parent.subtasks.findIndex(x=>x.id===tid); const [moved]=parent.subtasks.splice(i,1);
  // insérer juste après le parent dans la liste de l'event
  const pi=ev.tasks.findIndex(x=>x.id===parent.id);
  if(pi>=0) ev.tasks.splice(pi+1,0,moved); else ev.tasks.push(moved);
  save();
}
function demoteTask(tid,targetId){
  const r=findTaskAnywhere(tid); if(!r)return;
  const ev=eventOfLoc(r.loc);
  const target=flattenTasks(ev.tasks).find(x=>x.id===targetId); if(!target)return;
  if(isDescendant(r.task,targetId))return; // éviter cycle
  const arr=r.loc.parent?r.loc.parent.subtasks:ev.tasks;
  const i=arr.findIndex(x=>x.id===tid); const [moved]=arr.splice(i,1);
  if(!target.subtasks)target.subtasks=[]; target.subtasks.push(moved);
  save();
}

function listEventDests(){
  const dests=[];
  Object.entries(D.months).forEach(([mId,m])=>{ const mm=MONTHS.find(x=>x.id===mId); m.fetes.forEach(f=>f.events.forEach(e=>{
    dests.push({v:'fete|'+mId+'|'+f.id+'|'+e.id, label:(mm?mm.name:mId)+' › '+f.name+' › '+e.name});
  })); });
  D.programs.forEach(p=>p.events.forEach(e=>{ dests.push({v:'program|'+p.id+'||'+e.id, label:'📚 '+p.name+' › '+e.name}); }));
  return dests;
}
function destEvent(v){
  const parts=v.split('|'); const ctx=parts[0];
  if(ctx==='program'){ const p=D.programs.find(x=>x.id===parts[1]); return p?p.events.find(e=>e.id===parts[3]):null; }
  const m=D.months[parts[1]]; if(!m) return null; const f=m.fetes.find(x=>x.id===parts[2]); return f?f.events.find(e=>e.id===parts[3]):null;
}
function cloneTaskNewIds(t){
  const c=JSON.parse(JSON.stringify(t)); delete c._loc; delete c._isSub; delete c._parentId;
  const reid=(x)=>{ x.id=uid(); x.dependsOn=[]; (x.subtasks||[]).forEach(reid); }; reid(c); return c;
}
function ebMoveTo(v){ if(!v) return; syncInputs(); saveTask(true);
  const tgt=destEvent(v); if(!tgt){ toast('Destination introuvable'); return; }
  const r=findTaskAnywhere(editBuf.id); if(!r){ return; }
  const arr=r.loc.parent? r.loc.parent.subtasks : eventOfLoc(r.loc).tasks;
  const i=arr.findIndex(x=>x.id===editBuf.id); if(i<0) return; const moved=arr.splice(i,1)[0];
  tgt.tasks.push(moved); save(); closeSheet(); render(); toast('Tâche déplacée ✓');
}
function ebDuplicateTo(v){ if(!v) return; syncInputs(); saveTask(true);
  const tgt=destEvent(v); if(!tgt){ toast('Destination introuvable'); return; }
  const copy=cloneTaskNewIds(editBuf); tgt.tasks.push(copy); save(); toast('Tâche dupliquée ✓');
}
function openDatePicker(target){
  if(target==='task'||target==='reminder') syncInputs();

function genSessions(pid){
  const p=D.programs.find(x=>x.id===pid);

  if(!from||!to){ toast('Choisis les dates de début et de fin'); return; }

function openSmartSort(){ sheet={type:'smartsort'}; renderOverlay(); }
function smartSortSheet(){
  return `<div class="sheet-head"><div class="sheet-title">✨ Tri intelligent</div><button class="sheet-close" data-act="closeSheet()">✕</button></div>
  <div class="sheet-body">
    <p style="color:var(--ink-soft);margin-bottom:16px">Réorganise les tâches de cet événement automatiquement.</p>
    <button class="btn btn-primary btn-block" style="margin-bottom:10px" data-act="applySort('theme')">🗂️ Par thème<br><span style="font-weight:400;font-size:12px;opacity:.85">Regroupe par catégorie (courses, impression, salle…)</span></button>
    <button class="btn btn-gold btn-block" data-act="applySort('priority')">⏱️ Par priorité<br><span style="font-weight:400;font-size:12px;opacity:.85">Ce qui doit être anticipé en premier</span></button>
    <div class="hint" style="margin-top:16px">ℹ️ En version SaaS, ce tri sera affiné par l'IA (analyse fine du contenu et des délais réels).</div>
  </div>`;
}
function applySort(mode){
  const ev=curEvent(); if(!ev){closeSheet();return;}
  const tasks=ev.tasks.slice();
  if(mode==='theme'){
    const themeOf=t=>{
      const x=(t.text+' '+(t.budget&&t.budget.theme||'')).toLowerCase();
      if(t.budget&&t.budget.theme&&t.budget.theme!=='Divers')return t.budget.theme;
      if(/imprim|feuille|affiche|document|photocop/.test(x))return'Impression';
      if(/achet|bonbon|alcool|sandwich|nourrit|plateau|boisson|kidoush|gâteau/.test(x))return'Nourriture & achats';
      if(/chaise|salle|sukkah|montage|démont|nappe|drap|décor/.test(x))return'Salle & décoration';
      if(/hazan|photograph|bahour|anim|bénévole|personnel|pourboire/.test(x))return'Personnel';
      if(/lien|publi|annonce|whatsapp|réserv|message/.test(x))return'Communication';
      return'Autres';
    };
    const groups={};
    tasks.forEach(t=>{const k=themeOf(t);(groups[k]=groups[k]||[]).push(t);});
    groupedView={mode:'theme',groups:Object.entries(groups).map(([title,items])=>({title,items}))};
  } else {
    // priorité : score selon mots-clés d'anticipation + dépendances + durée
    const score=t=>{
      const x=t.text.toLowerCase(); let s=0;
      if(/réserv|autoris|command|confirm|location|salle|montage|atelier|terrain/.test(x))s+=100; // à anticiper
      if(/imprim|feuille|prépar|traduc/.test(x))s+=60;
      if(/achet|command/.test(x))s+=40;
      if(/jour j|matin|soir|annonc|servir|rang|nettoy|bilan|remerci/.test(x))s-=40; // proche de l'événement
      s+=(t.dependsOn&&t.dependsOn.length?-20:0);
      s+=Math.min(totalDuration(t),300)/10;
      return s;
    };
    const sorted=tasks.slice().sort((a,b)=>score(b)-score(a));
    const cut1=sorted.filter(t=>score(t)>=80), cut2=sorted.filter(t=>score(t)<80&&score(t)>=20), cut3=sorted.filter(t=>score(t)<20);
    groupedView={mode:'priority',groups:[
      {title:'🔴 À anticiper en priorité',items:cut1},
      {title:'🟡 À préparer ensuite',items:cut2},
      {title:'🟢 Dernière ligne droite',items:cut3},
    ].filter(g=>g.items.length)};
  }
  closeSheet(); render();
}

function tplItemToTask(it){
  const t=mkTask((it&&it.text)||'');
  if(it){ t.responsible=it.responsible||''; t.duration=it.duration||0; t.notes=it.notes||it.note||'';
    if(it.budget) t.budget={amount:it.budget.amount||0,theme:it.budget.theme||'Divers'};
    const m=it.material||{}; t.material.type=m.type||'buy'; t.material.note=m.note||'';
    if(m.product||m.store||m.value) t.material.lines=[{qty:m.value||'',product:m.product||'',store:m.store||''}];
    if(Array.isArray(it.subtasks)) t.subtasks=JSON.parse(JSON.stringify(it.subtasks));
    else if(it.subs&&it.subs.length) t.subtasks=it.subs.map(s=>mkTask(s));
  }
  return t;
}

function todayKey(d){ d=d||new Date(); const o=new Date(d.getTime()-d.getTimezoneOffset()*60000); return o.toISOString().split('T')[0]; } // date LOCALE (civile) — bascule à minuit local
function ensureJournal(key){ if(!D.journal[key]) D.journal[key]={note:'',counters:{tefilin:0,cours:0,participants:0,visites:0},validated:false}; return D.journal[key]; }
let COUNTERS=[{k:'tefilin',em:'🪬',label:'Tefilin posés'},{k:'cours',em:'📖',label:'Cours donnés'},{k:'participants',em:'👥',label:'Participants'},{k:'visites',em:'🏠',label:'Visites'}];
function syncCounters(){ if(!D)return; if(!Array.isArray(D.counters)||!D.counters.length){ D.counters=COUNTERS; } COUNTERS=D.counters; }
function addCounter(){ const em=prompt('Icône (emoji) du nouveau compteur :','⭐'); if(em===null)return; const label=prompt('Nom du compteur :',''); if(label===null||!label.trim())return; syncCounters(); D.counters.push({k:'c_'+uid(),em:(em||'⭐').trim()||'⭐',label:label.trim()}); save(); render(); }
function editCounter(k){ syncCounters(); const c=D.counters.find(x=>x.k===k); if(!c)return; const em=prompt('Icône (emoji) :',c.em); if(em===null)return; const label=prompt('Nom :',c.label); if(label===null||!label.trim())return; c.em=(em||c.em).trim()||c.em; c.label=label.trim(); save(); render(); }
function delCounter(k){ syncCounters(); const c=D.counters.find(x=>x.k===k); if(!c)return; if(!confirm('Supprimer le compteur « '+c.label+' » ? (les chiffres déjà saisis restent dans les journées)'))return; D.counters=D.counters.filter(x=>x.k!==k); COUNTERS=D.counters; save(); render(); }

    const open=[]; const noDate=[];
    const _handle=(t,where,eff)=>{ if(t.status==='done')return; if(Array.isArray(t.reminders)){ t.reminders.forEach(n=>{ const ri=remIso(eff,n); if(ri&&ri===jKey) open.push({t,where,eff:eff,reminder:n}); }); } if(t.pinDay){ open.push({t,where,eff:eff}); return; } if(!eff){ if(isJToday) noDate.push({t,where,eff:''}); return; } if(eff===jKey || (isJToday && eff<jKey)) open.push({t,where,eff:eff}); };
    Object.entries(D.months).forEach(([mId,m])=>m.fetes.forEach(f=>f.events.forEach(e=>{ const eff0=e.date||f.date||''; flattenTasks(e.tasks).forEach(t=>_handle(t,f.name+' › '+e.name,t.date||eff0)); })));
    Object.entries(D.months).forEach(([mId,m])=>{ const mm=MONTHS.find(x=>x.id===mId); flattenTasks(m.tasks||[]).forEach(t=>_handle(t,(mm?mm.name:'Mois'),t.date||'')); });
    D.programs.forEach(p=>p.events.forEach(e=>{ const eff0=e.date||p.date||''; flattenTasks(e.tasks).forEach(t=>_handle(t,p.name+' › '+e.name,t.date||eff0)); }));
    const _row=(o)=>{ const t=o.t,where=o.where,eff=o.eff; const st=stOf(t.status); const late=eff&&eff<todayKey(); const remTag=o.reminder?`<span class="tag" style="background:var(--gold-soft);color:var(--gold)">🔔 Rappel ${remLabel(o.reminder)}</span>`:''; const dateTag=eff?`<span class="tag" style="${late?'background:var(--red-soft);color:var(--red)':'background:var(--primary-soft);color:var(--primary)'}">${late?'⏰ en retard · ':'📅 '}${fmtDate(eff)}</span>`:''; return `<div class="task"><div class="task-main"><div class="check" style="border-color:${st.c};background:${t.status==='done'?st.c:'#fff'}" data-act="toggleTask('${t.id}')">${t.status==='done'?'✓':''}</div><div class="task-content" data-act="openTask('${t.id}')"><div class="task-text">${esc(t.text)}</div><div class="task-tags"><span class="tag tag-sub">${esc(where)}</span>${remTag}${dateTag}${t.responsible?`<span class="tag tag-who">👤 ${esc(t.responsible)}</span>`:''}</div></div></div></div>`; };
    if(!open.length && !noDate.length){
      html+=emptyHTML('🎉',isJToday?'Tout est fait !':'Rien ce jour',isJToday?'Aucune tâche pour aujourd\'hui.':'Aucune tâche prévue ce jour.','','');

      if(open.length){ html+=`<div class="sec-sub" style="margin-bottom:10px">${open.length} tâche(s) ${isJToday?"pour aujourd'hui":'ce jour'}</div>`; open.slice(0,80).forEach(o=>html+=_row(o)); }
      else if(isJToday){ html+=`<div class="sec-sub" style="margin-bottom:10px">Aucune tâche datée aujourd'hui.</div>`; }
      if(noDate.length && isJToday){ html+=`<div class="section-label" style="margin-top:16px">📌 Sans date — à planifier (${noDate.length})</div><div class="hint" style="margin-bottom:8px">Ces tâches n'ont pas de date. Mets une date à leur fête / événement (ou à la tâche) pour les répartir sur les bons jours.</div>`; noDate.slice(0,80).forEach(o=>html+=_row(o)); }
    }
  }
  else if(jTab==='report'){
    const key=journalKey; const j=ensureJournal(key);
    const isToday = key===todayKey();
    const dObj=new Date(key+'T12:00:00');
    const civ = dObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    html+=`<div class="phead" style="padding:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">

        <div style="flex:1;text-align:center"><div style="font-weight:600;color:var(--ink);text-transform:capitalize">${civ}${j.validated?' <span style="color:var(--green)">✓</span>':''}</div><div style="font-size:11.5px;color:var(--ink-soft)">🕎 ${hebrewDate(key)}</div></div>
        <button class="cbtn" data-act="journalNav(1)" title="Jour suivant">▶</button>
      </div>
      ${!isToday?`<button class="btn btn-soft btn-sm btn-block" style="margin-bottom:10px" data-act="journalToday()">↩ Revenir à aujourd'hui</button>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between;margin:0 0 6px">
        <div class="section-label" style="margin:0">Compte rendu</div>
        <button class="btn btn-ghost btn-sm" data-act="addCounter()">＋ Compteur</button>
      </div>
      ${COUNTERS.map(cn=>{const arch=(j.archived&&j.archived[cn.k])||0;return `<div class="counter"><div class="counter-info"><span class="counter-em" data-act="editCounter('${cn.k}')" style="cursor:pointer" title="Modifier l'icône / le nom">${cn.em}</span><span class="counter-name" data-act="editCounter('${cn.k}')" style="cursor:pointer">${cn.label}${arch?` <span style="font-size:11px;color:var(--green);font-weight:600">✓ ${arch} validé${arch>1?'s':''}</span>`:''}</span></div>
        <div class="counter-ctrl"><button class="cbtn danger" data-act="delCounter('${cn.k}')" title="Supprimer" style="color:var(--red)">🗑</button><button class="cbtn" data-act="bumpCounter('${key}','${cn.k}',-1)">−</button>
        <span class="cval">${j.counters[cn.k]||0}</span>
        <button class="cbtn" data-act="bumpCounter('${key}','${cn.k}',1)">+</button></div></div>`;}).join('')}
      <div class="hint" style="margin-top:6px">Touche l'icône ou le nom d'un compteur pour le modifier. La corbeille le supprime.</div>
      <div class="field" style="margin:14px 0 0"><label class="field-label">Notes du jour</label>
        <textarea class="textarea" id="j-note" onchange="saveNote('${key}',this.value)" placeholder="Ce qui a marqué la journée…">${esc(j.note||'')}</textarea></div>
      <button class="btn ${j.validated?'btn-soft':'btn-primary'} btn-block" style="margin-top:12px" data-act="validateReport('${key}')">${j.validated?'✓ Validé — appuyer pour modifier':'✓ Valider ce compte rendu'}</button>
    </div>`;
    html+=`<div class="section-label" style="margin:20px 0 8px">📊 Bilan</div>`;
    html+=dashboardInline();
  }
  else if(jTab==='dash'){
    html+=dashboardInline();
  }
  c.innerHTML=html;
}
function setJTab(t){ jTab=t; render(); }
function journalNav(delta){ const d=new Date(journalKey+'T12:00:00'); d.setDate(d.getDate()+delta); journalKey=todayKey(d); render(); }
function journalToday(){ journalKey=todayKey(); render(); }
function validateReport(key){
  const j=ensureJournal(key);
  if(!j.validated){
    // Validation : la saisie du jour est « engrangée » (archived) et le compteur visible repart à zéro.
    // Le Bilan additionne archived + counters, donc rien n'est perdu.
    j.archived=j.archived||{};
    COUNTERS.forEach(c=>{ j.archived[c.k]=(j.archived[c.k]||0)+(j.counters[c.k]||0); j.counters[c.k]=0; });
    j.validated=true;
  } else {
    // Modifier : on ré-injecte le cumul validé dans la saisie pour pouvoir corriger.
    COUNTERS.forEach(c=>{ j.counters[c.k]=(j.counters[c.k]||0)+((j.archived&&j.archived[c.k])||0); if(j.archived)j.archived[c.k]=0; });
    j.validated=false;
  }
  save(); render();
}
function openReportDay(key){ journalKey=key; jTab='report'; render(); }
function bumpCounter(key,k,d){ const j=ensureJournal(key); j.counters[k]=Math.max(0,(j.counters[k]||0)+d); save(); render(); }
function saveNote(key,v){ const j=ensureJournal(key); j.note=v; save(); }

function dashboardInline(){
  const r=computeRange(dashRange);
  return `<div class="filters">
    ${[['today','Jour'],['week','Semaine'],['month','Mois'],['custom','Plage…']].map(([v,l])=>`<button class="chip ${dashRange===v?'active':''}" data-act="setDashRange('${v}')">${l}</button>`).join('')}
  </div>
  ${dashRange==='custom'?`<div class="daterange">
    <div class="field" style="margin:0;flex:1"><label class="field-label">Du</label><input class="input" type="date" id="dr-from" value="${customFrom||''}" onchange="customFrom=this.value;render()"></div>
    <div class="field" style="margin:0;flex:1"><label class="field-label">Au</label><input class="input" type="date" id="dr-to" value="${customTo||''}" onchange="customTo=this.value;render()"></div>
  </div>`:''}
  <div class="stat-grid">
    <div class="stat"><span class="stat-em">✅</span><div class="stat-val">${r.taskDone||0}</div><div class="stat-label">Tâches faites${dashRange==='today'?" aujourd'hui":''}</div></div>
    <div class="stat"><span class="stat-em">📋</span><div class="stat-val">${r.taskTotal||0}</div><div class="stat-label">Tâches (missions)</div></div>
    ${COUNTERS.map(cn=>`<div class="stat"><span class="stat-em">${cn.em}</span><div class="stat-val">${r.totals[cn.k]||0}</div><div class="stat-label">${cn.label}</div></div>`).join('')}
  </div>
  <div class="phead" style="padding:15px"><div class="section-label" style="margin:0 0 8px">${r.label} · ${r.days} jour(s) renseigné(s)</div>
    ${r.notes.length?r.notes.map(n=>`<div data-act="openReportDay('${n.key}')" style="padding:8px 0;border-top:1px solid var(--line-soft);cursor:pointer"><div style="font-size:12px;color:var(--gold);font-weight:600">${n.date} <span style="color:var(--ink-soft);font-weight:400">· ✏️ modifier</span></div><div style="font-size:13.5px;color:var(--ink)">${esc(n.note)}</div></div>`).join(''):'<div style="color:var(--ink-soft);font-size:13.5px">Aucune note sur la période.</div>'}
  </div>
  <button class="btn btn-soft btn-block" style="margin-top:12px" data-act="openDashExport()">📤 Exporter ce bilan</button>`;
}
let customFrom='', customTo='';
function setDashRange(v){ dashRange=v; render(); }
function computeRange(mode){
  const now=new Date(); let from,to,label;
  if(mode==='today'){ from=to=todayKey(now); label='Aujourd\'hui'; }
  else if(mode==='week'){ const d=new Date(now); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); from=todayKey(d); to=todayKey(now); label='Cette semaine'; }
  else if(mode==='month'){ const d=new Date(now.getFullYear(),now.getMonth(),1); from=todayKey(d); to=todayKey(now); label='Ce mois-ci'; }
  else { from=customFrom||todayKey(now); to=customTo||todayKey(now); label='Du '+fmtDate(from)+' au '+fmtDate(to); }
  const totals={}; COUNTERS.forEach(c=>totals[c.k]=0); const notes=[]; let days=0;
  Object.entries(D.journal).forEach(([k,j])=>{
    if(k>=from&&k<=to){ let any=false; COUNTERS.forEach(c=>{const v=(j.counters[c.k]||0)+((j.archived&&j.archived[c.k])||0);totals[c.k]+=v;if(v)any=true;}); if(j.note){notes.push({date:fmtDate(k),note:j.note,key:k});any=true;} if(any)days++; }
  });
  notes.sort((a,b)=>a.date<b.date?1:-1);
  // compteurs de tâches (missions) sur la plage
  let taskTotal=0, taskDone=0;
  datedAll().forEach(x=>{ if(x.kind==='reminder'||!x.t)return; const iso=x.iso; if(iso&&iso>=from&&iso<=to){ taskTotal++; if(x.t.status==='done') taskDone++; } });
  return {from,to,label,totals,notes,days,taskTotal,taskDone};
}
function fmtDate(k){ try{return new Date(k).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}catch(e){return k;} }

  if(r.notes.length){ txt+=`\nNotes :\n`; r.notes.forEach(n=>txt+=`• ${n.date} — ${n.note}\n`); }

  <div class="sheet-body">
    <div class="field"><label class="field-label">Aperçu (modifiable)</label><textarea class="textarea" id="exp-txt" style="min-height:200px;font-family:monospace;font-size:13px">${esc(txt)}</textarea></div>

function setShopRange(v){ shopRange=v; render(); }
function renderShopping(c){
  const today=new Date(); today.setHours(0,0,0,0);
  const limitDays = shopRange==='all'? null : parseInt(shopRange);
  const within=(iso)=>{ if(limitDays===null) return true; if(!iso) return false; const d=new Date(iso+'T12:00:00'); const days=Math.floor((d-today)/86400000); return days>=0 && days<=limitDays; };
  // rassembler le matériel "à acheter" non fait, avec échéance héritée (tâche → événement → fête)
  const byStore={};
  const collect=(arr,where,effDate)=>{ (arr||[]).forEach(t=>{
    const m=t.material;
    const tDate=t.date||effDate||'';
    if(m&&m.type==='buy'&&t.status!=='done'){
      const lines=(m.lines&&m.lines.length)?m.lines:null;
      if(lines){
        if(within(tDate)) lines.forEach(ln=>{ if(ln.product||ln.store||ln.qty){ const store=ln.store||'Sans magasin'; (byStore[store]=byStore[store]||[]).push({t,where,date:tDate,line:ln}); } });
      } else if(m.note||/achet/i.test(t.text)){
        if(within(tDate)){ (byStore['Sans magasin']=byStore['Sans magasin']||[]).push({t,where,date:tDate,line:null}); }
      }

// ---------- GESTION DES CLICS (délégation — robuste partout) ----------
// Un seul gestionnaire lit l'attribut data-act (ou onclick legacy) et l'exécute.
// Fiable dans tous les navigateurs et webviews, contrairement aux handlers inline
// qui peuvent être neutralisés dans certains contextes.
document.addEventListener('click', function(ev){
  // Laisser les champs de saisie natifs fonctionner (focus, frappe, ouverture des listes).
  if(ev.target.closest('input,select,textarea,option')) return;
  const el = ev.target.closest('[data-act]');
  if(!el) return;
  const code = el.getAttribute('data-act');
  if(!code) return;
  // Element qui ne sert qu'a bloquer la propagation (panneau) : ne rien executer.
  if(code.replace(/\s/g,'')==='event.stopPropagation()') return;
  ev.preventDefault();
  try{
    const fn = new Function('event', 'with(window){ ' + code + ' }');
    fn.call(el, ev);
  }
  catch(e){ console.error('Action echouee:', code, e); }
});
// ---------- GLISSER-DÉPOSER DES TÂCHES (poignée ⠿, tactile + souris) ----------
let _drag=null;
document.addEventListener('pointerdown', function(ev){
  const h=ev.target.closest('[data-drag]'); if(!h) return;
  const row=h.closest('.drag-row'); if(!row) return;
  ev.preventDefault();
  _drag={ row:row, kind:row.getAttribute('data-dragkind'), pid:ev.pointerId };
  row.classList.add('dragging');
  try{ row.setPointerCapture(ev.pointerId); }catch(e){}
});
document.addEventListener('pointermove', function(ev){
  if(!_drag) return;
  ev.preventDefault();
  const rows=Array.from(document.querySelectorAll('.drag-row[data-dragkind="'+_drag.kind+'"]'));
  const y=ev.clientY; let target=null;
  for(const r of rows){ if(r===_drag.row) continue; const rc=r.getBoundingClientRect(); if(y>=rc.top && y<=rc.bottom){ target=r; break; } }
  if(target){ const rc=target.getBoundingClientRect(); const before=y<rc.top+rc.height/2; const parent=_drag.row.parentNode; if(before) parent.insertBefore(_drag.row,target); else parent.insertBefore(_drag.row,target.nextSibling); }
});
function _endDrag(){ if(!_drag) return; _drag.row.classList.remove('dragging'); commitDragOrder(_drag.kind); _drag=null; }
document.addEventListener('pointerup', _endDrag);
document.addEventListener('pointercancel', _endDrag);
function commitDragOrder(kind){
  let arr=null;
  if(kind==='task'){ const ev=curEvent(); arr=ev&&ev.tasks; }
  else if(kind==='fete'){ const m=curMonth(); arr=m&&m.fetes; }
  else if(kind==='event'){ const c=curContainer(); arr=c&&c.events; }
  if(!arr) return;
  const order=Array.from(document.querySelectorAll('.drag-row[data-dragkind="'+kind+'"]')).map(r=>r.getAttribute('data-dragid'));
  arr.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  save(); render();
}

    if(!D._activeYear) D._activeYear=D.year;
    if(!D.journal) D.journal={};
    if(!D.stores) D.stores=['Carrefour','Amazon'];
    if(!D.eventTemplates) D.eventTemplates=seedData().eventTemplates;
    migrateMaterials();
    syncCounters();
    if(!Array.isArray(D.publics)) D.publics=['Tout public','Hommes','Femmes','Enfants','Jeunes','Familles','Étudiants'];
    lang=D._lang||'fr'; document.documentElement.lang=lang; document.documentElement.dir=(lang==='he'?'rtl':'ltr');
    render();
  }catch(err){
    document.getElementById('app').innerHTML='<div style="padding:40px;font-family:sans-serif;color:#1C2A3A">'+
      '<h2 style="font-family:Georgia,serif">stepbystep</h2>'+
      '<p style="color:#B23B3B">Une erreur est survenue au démarrage.</p>'+
      '<pre style="background:#F7F4ED;padding:12px;border-radius:8px;overflow:auto;font-size:12px">'+esc(err&&err.message||err)+'</pre>'+
      '<button data-act="try{localStorage.removeItem(\'marbitz-v11\')}catch(e){};location.reload()" style="margin-top:12px;padding:10px 16px;background:#1E3A6E;color:#fff;border:none;border-radius:8px">Réinitialiser et recharger</button></div>';
    console.error(err);
  }
}

else boot();
